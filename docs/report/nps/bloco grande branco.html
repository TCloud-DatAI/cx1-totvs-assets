<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPS Bloco Branco Responsivo</title>

<body style="margin: 0; padding: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f1f5f9;">

    <table width="100%" border="0" cellspacing="0" cellpadding="0" style="height: 100vh;">
        <tr>
            <td valign="top" style="padding: 10px;">
                
                <table width="100%" border="0" cellspacing="0" cellpadding="0" style="background-color: #ffffff; border-radius: 20px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); height: 100%;">
                    <tr>
                        <td valign="top" style="padding: 3%;">
                            &nbsp;

                    </tr>
                </table>

            </td>
        </tr>
    </table>
