<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <style>
        /* Reset de margens */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: transparent; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* O Bloco Branco (Card) sem sombra */
        .card {
            width: 100%; /* Ocupa tudo para facilitar a sobreposição */
            height: 100%;
            background-color: white;
            border-radius: 12px; /* Arredondamento conforme seu print */
            position: relative;
            overflow: hidden; 
            border: 1.5px solid #e2e8f0; /* Borda sólida fina em volta de tudo */
        }

        /* A Faixa Colorida no Topo */
        #topo-colorido {
            width: 100%;
            height: 10px; /* Grossura da faixa */
            background-color: #ec4899; /* Cor padrão */
            position: absolute;
            top: 0;
            left: 0;
            border-bottom: 1px solid rgba(0,0,0,0.05); /* Divisão sutil */
        }
    </style>
</head>
<body>

    <div class="card">
        <div id="topo-colorido"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const corParam = urlParams.get('cor');
        const topo = document.getElementById('topo-colorido');

        const cores = {
            'azul': '#2b4b8f',
            'verde': '#16a34a',
            'rosa': '#ec4899',
            'roxo': '#a855f7',
            'vermelho': '#dc2626',
            'cinza': '#e2e8f0'
        };

        if (corParam && cores[corParam]) {
            topo.style.backgroundColor = cores[corParam];
        }
    </script>
</body>
</html>
