<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPS Header Logo</title>
</head>
<body style="margin: 0; padding: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f1f5f9;">
    
    <table width="100%" border="0" cellspacing="0" cellpadding="0" align="center" style="max-width: 1400px; margin: 0 auto; padding: 10px;">
        <tr>
            <td>
                <table width="100%" border="0" cellspacing="0" cellpadding="0" style="background-color: #0c1e3f; background-image: linear-gradient(135deg, #0c1e3f 0%, #1e3a8a 100%); padding: 1.5% 4%; border-radius: 12px; box-shadow: 0 4px 15px rgba(12,30,63,0.1);">
                    <tr>
                        <td valign="middle" style="padding: 10px 0;">
                            <img src="https://navega.cloudtotvs.com.br/uxlib/img/login/img/totvs-logo-white.svg" alt="TOTVS" style="height: 20px; width: auto; display: block;">
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>

</body>
</html>
