<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>NPS Header</title>
</head>
<body style="margin: 0; padding: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f1f5f9;">
    
    <table width="100%" border="0" cellspacing="0" cellpadding="0" align="center" style="max-width: 1400px; margin: 0 auto; padding: 15px 15px 0 15px;">
        <tr>
            <td style="background-color: #0c1e3f; background-image: linear-gradient(135deg, #0c1e3f 0%, #1e3a8a 100%); padding: 20px 35px; border-radius: 16px; box-shadow: 0 10px 25px rgba(12,30,63,0.15);">
                <table width="100%" border="0" cellspacing="0" cellpadding="0">
                    <tr>
                        <td valign="middle">
                            <img src="https://navega.cloudtotvs.com.br/uxlib/img/login/img/totvs-logo-white.svg" alt="TOTVS" style="height: 22px; vertical-align: middle;">
                            <span style="color: #ffffff; font-size: 22px; font-weight: bold; margin-left: 15px; vertical-align: middle;">NPS Cloud Report</span>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>

</body>
</html>
