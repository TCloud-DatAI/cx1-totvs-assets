<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 10px; background: #fff; }
        #container-kpi { width: 100%; min-height: 250px; }
    </style>
</head>
<body>
    <div id="container-kpi"></div>
    <script>
        function renderizar() {
            const params = new URLSearchParams(window.location.search);
            const getV = (p) => params.get(p) || "0";

            // Dados estruturados vindos da URL do QuickSight
            const dados = {
                std:   { n: 'NPS STD',   s: getV('s_std'),  p: getV('p_std'),  ne: getV('n_std'), d: getV('d_std') },
                prime: { n: 'NPS PRIME', s: getV('s_pri'),  p: getV('p_pri'),  ne: getV('n_pri'), d: getV('d_pri') },
                iaas:  { n: 'NPS IaaS',  s: getV('s_iaas'), p: getV('p_iaas'), ne: getV('n_iaas'),d: getV('d_iaas') }
            };

            // Lógica: Sempre mostra STD e PRIME. Só mostra IaaS se o score for > 0
            let linhas = [dados.std, dados.prime];
            if (parseFloat(dados.iaas.s) > 0) {
                linhas.push(dados.iaas);
            }

            Highcharts.chart('container-kpi', {
                chart: { type: 'bar', backgroundColor: 'transparent' },
                title: { text: null },
                xAxis: {
                    categories: linhas.map(l => l.n),
                    lineWidth: 0,
                    labels: { style: { fontSize: '14px', fontWeight: 'bold', color: '#001f3f' } }
                },
                yAxis: { visible: false },
                legend: { enabled: false },
                credits: { enabled: false },
                plotOptions: {
                    series: {
                        dataLabels: {
                            enabled: true,
                            useHTML: true,
                            align: 'left',
                            formatter: function() {
                                const info = linhas[this.x];
                                return `
                                    <div style="display: flex; width: 450px; justify-content: space-between; align-items: center; margin-left: 15px;">
                                        <span style="font-size: 28px; font-weight: bold; color: #001f3f; width: 60px; text-align: center;">${info.s}</span>
                                        <span style="font-size: 20px; font-weight: bold; color: #28a745; width: 60px; text-align: center;">${info.p}</span>
                                        <span style="font-size: 20px; font-weight: bold; color: #ff8c00; width: 60px; text-align: center;">${info.ne}</span>
                                        <span style="font-size: 20px; font-weight: bold; color: #dc3545; width: 60px; text-align: center;">${info.d}</span>
                                    </div>
                                `;
                            }
                        }
                    }
                },
                // Série invisível apenas para posicionar os textos
                series: [{ color: 'rgba(0,0,0,0)', data: linhas.map(l => 1) }]
            });
        }
        renderizar();
    </script>
</body>
</html>
