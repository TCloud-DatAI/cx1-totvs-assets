<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report NPS Skeleton</title>
</head>
<body style="margin: 0; padding: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f1f5f9; color: #0f172a;">
    
    <table width="95%" border="0" cellspacing="0" cellpadding="0" align="center" style="background-color: #f1f5f9; padding: 20px 0; max-width: 1200px;">
        <tr>
            <td align="center">
                <table width="100%" border="0" cellspacing="0" cellpadding="0">
                    
                    <tr>
                        <td style="background-color: #0c1e3f; background-image: linear-gradient(135deg, #0c1e3f 0%, #1e3a8a 100%); padding: 25px 35px; border-radius: 16px;">
                            <table width="100%" border="0" cellspacing="0" cellpadding="0">
                                <tr>
                                    <td width="70%" valign="middle">
                                        <img src="https://navega.cloudtotvs.com.br/uxlib/img/login/img/totvs-logo-white.svg" alt="TOTVS" style="height: 24px; vertical-align: middle;">
                                        <span style="color: #ffffff; font-size: 24px; font-weight: bold; margin-left: 15px; vertical-align: middle;">NPS Cloud Report</span>
                                    </td>
                                    <td width="30%" align="right" valign="middle">
                                        <div style="background-color: rgba(255,255,255,0.15); padding: 10px 25px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.25); min-width: 100px; height: 20px;"></div>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <tr><td height="30"></td></tr>

                    <tr>
                        <td align="left">
                            <p style="margin: 0 0 20px 0; color: #0f172a; font-size: 22px; font-weight: 900;">Performance por Produto (PaaS)</p>
                            
                            <table width="100%" border="0" cellspacing="0" cellpadding="0">
                                <tr>
                                    <td width="32%" valign="top" style="background-color: #ffffff; border-radius: 20px; border: 1px solid #e2e8f0; border-top: 8px solid #a855f7; height: 420px; vertical-align: top;">
                                        <div style="padding-top: 30px; text-align: center;">
                                            <span style="display: block; color: #0f172a; font-size: 20px; font-weight: 900; text-transform: uppercase;">Protheus</span>
                                        </div>
                                    </td>
                                    
                                    <td width="2%"></td>
                                    
                                    <td width="32%" valign="top" style="background-color: #ffffff; border-radius: 20px; border: 1px solid #e2e8f0; border-top: 8px solid #ec4899; height: 420px; vertical-align: top;">
                                        <div style="padding-top: 30px; text-align: center;">
                                            <span style="display: block; color: #0f172a; font-size: 20px; font-weight: 900; text-transform: uppercase;">RM</span>
                                        </div>
                                    </td>
                                    
                                    <td width="2%"></td>
                                    
                                    <td width="32%" valign="top" style="background-color: #ffffff; border-radius: 20px; border: 1px solid #e2e8f0; border-top: 8px solid #84cc16; height: 420px; vertical-align: top;">
                                        <div style="padding-top: 30px; text-align: center;">
                                            <span style="display: block; color: #0f172a; font-size: 20px; font-weight: 900; text-transform: uppercase;">Datasul</span>
                                        </div>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
