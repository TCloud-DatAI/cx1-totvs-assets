<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>NPS Topo - Layout Final</title>
</head>
<body style="margin: 0; padding: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f1f5f9; color: #0f172a;">
    
    <table width="98%" border="0" cellspacing="0" cellpadding="0" align="center" style="max-width: 1400px; margin: 0 auto; padding: 20px;">
        <tr>
            <td style="background-color: #0c1e3f; background-image: linear-gradient(135deg, #0c1e3f 0%, #1e3a8a 100%); padding: 25px 35px; border-radius: 16px; box-shadow: 0 10px 25px rgba(12,30,63,0.15);">
                <table width="100%" border="0" cellspacing="0" cellpadding="0">
                    <tr>
                        <td width="70%" valign="middle">
                            <img src="https://navega.cloudtotvs.com.br/uxlib/img/login/img/totvs-logo-white.svg" alt="TOTVS" style="height: 24px; vertical-align: middle;">
                            <span style="color: #ffffff; font-size: 24px; font-weight: bold; margin-left: 15px; vertical-align: middle;">NPS Cloud Report</span>
                        </td>
                        <td width="30%" align="right" valign="middle">
                            <div style="background-color: rgba(255,255,255,0.15); padding: 10px 25px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.25); min-width: 120px; height: 20px;"></div>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>

        <tr><td height="25"></td></tr>

        <tr>
            <td>
                <table width="100%" border="0" cellspacing="0" cellpadding="0" style="background-color: #ffffff; border-radius: 20px; padding: 30px; border: 1px solid #e2e8f0; height: 500px; vertical-align: top;">
                    <tr>
                        <td valign="top">
                            
                            <table width="100%" border="0" cellspacing="0" cellpadding="0">
                                <tr>
                                    <td width="35%" valign="top">
                                        <div style="height: 250px;"></div> </td>

                                    <td width="65%" valign="top">
                                        <table width="100%" border="0" cellspacing="0" cellpadding="0" style="border-top: 1px solid #f1f5f9; padding-top: 20px; margin-top: 200px;">
                                            <tr>
                                                <td width="16%" align="left">
                                                    <div style="height: 100px;"></div>
                                                </td>

                                                <td width="28%" align="center" style="border-left: 1px solid #f1f5f9;">
                                                    <span style="color: #16a34a; font-size: 13px; font-weight: bold; letter-spacing: 1px;">PROMOTORES</span>
                                                    <div style="height: 120px;"></div> 
                                                </td>

                                                <td width="28%" align="center" style="border-left: 1px solid #f1f5f9;">
                                                    <span style="color: #d97706; font-size: 13px; font-weight: bold; letter-spacing: 1px;">NEUTROS</span>
                                                    <div style="height: 120px;"></div>
                                                </td>

                                                <td width="28%" align="center" style="border-left: 1px solid #f1f5f9;">
                                                    <span style="color: #dc2626; font-size: 13px; font-weight: bold; letter-spacing: 1px;">DETRATORES</span>
                                                    <div style="height: 120px;"></div>
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                            </table>

                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
