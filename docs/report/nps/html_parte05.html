<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>NPS Bloco Único</title>
</head>
<body style="margin: 0; padding: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f1f5f9;">

    <table width="100%" border="0" cellspacing="0" cellpadding="0" style="max-width: 1400px; margin: 0 auto; padding: 15px;">
        <tr>
            <td>
                <table width="100%" border="0" cellspacing="0" cellpadding="0" style="background-color: #ffffff; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 20px; height: 35px;">
                    <tr>
                        <td style="padding: 0 20px;">&nbsp;</td>
                    </tr>
                </table>

                <table width="100%" border="0" cellspacing="0" cellpadding="0">
                    <tr>
                        <td valign="top" style="background-color: #ffffff; border-radius: 20px; border: 1px solid #e2e8f0; height: 500px;">
                            <div style="padding: 25px;">
                                &nbsp;
                            </div>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>

</body>
</html>
