<!DOCTYPE html>
<html lang="pt-BR" style="height: 100%; margin: 0; padding: 0; background: transparent !important;">
<head>
    <meta charset="UTF-8">
    <style>
        /* Força tudo a ser transparente e remove margens que o navegador coloca */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            height: 100%; 
            width: 100%; 
            background: transparent !important; 
            overflow: hidden;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        .container {
            height: 100%;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent !important;
        }
        .badge {
            /* Apenas a borda e o texto, sem fundo sólido */
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 10px;
            padding: 6px 16px;
            background: rgba(255, 255, 255, 0.05); /* Quase invisível */
            backdrop-filter: blur(2px);
        }
        #textoCiclo {
            color: #ffffff;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 0.8px;
            white-space: nowrap;
            text-shadow: 0px 1px 2px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">
            <span id="textoCiclo">CARREGANDO...</span>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let valorParam = urlParams.get('ciclo');
        const display = document.getElementById('textoCiclo');

        if (!valorParam || valorParam.toLowerCase().includes('all')) {
            display.innerText = "VISÃO GERAL";
        } else {
            let selecionados = valorParam.split(',');
            if (selecionados.length === 1) {
                display.innerText = selecionados[0].toUpperCase();
            } else {
                let anos = selecionados.map(s => s.match(/\d{4}/)).filter(n => n);
                let anoUnico = [...new Set(anos.map(a => a[0]))];
                if (anoUnico.length === 1) {
                    display.innerText = "CICLOS DE " + anoUnico[0];
                } else {
                    display.innerText = selecionados.length + " CICLOS";
                }
            }
        }
    </script>
</body>
</html>
